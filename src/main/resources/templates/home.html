<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Hotel Reservation Application</title>
<p th:if="${error}" style="color:red;" th:text="${error}"></p>
<style>

body{
font-family: Arial, sans-serif;
background-color:#f2f2f2;
text-align:center;
}

.container{
width:500px;
margin:auto;
background:white;
padding:30px;
margin-top:60px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

h1{
margin-bottom:30px;
}

a{
display:block;
margin:15px;
padding:10px;
background:#007bff;
color:white;
text-decoration:none;
border-radius:5px;
}

a:hover{
background:#0056b3;
}

input{
padding:8px;
margin-top:10px;
}

button{
padding:8px 15px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e7e34;
}

</style>

</head>

<body>

<div class="container">

<h1>Hotel Reservation Application</h1>

<a href="/findRoom">Find and Reserve a Room</a>

<a href="/createAccount">Create an Account</a>

<a href="/admin">Admin Panel</a>

<h3>See My Reservations</h3>

<form action="/seeReservations" method="post">

Enter Email:<br> <input type="text" name="email" placeholder="Enter your email">

<br><br>

<button type="submit">View Reservations</button>

</form>

</div>

</body>
</html>
